{{define "content"}}
<h2>用户管理</h2>
<a href="/admin/create"><button>建账户</button></a>
<table><tr><th>ID</th><th>邮箱</th><th>角色</th><th>余额</th><th>状态</th><th>操作</th></tr>
{{range .Data.users}}<tr><td>{{.ID}}</td><td>{{.Email}}</td><td>{{.Role}}</td><td>{{usd .Balance}}</td><td>{{if eq .Status 1}}启用{{else}}禁用{{end}}</td>
<td>
  <a href="/admin/balance?id={{.ID}}">加余额</a>
  <a href="/admin/reset?id={{.ID}}">重置密码</a>
  {{if eq .Status 1}}
  <form method="post" action="/admin/users/{{.ID}}/status" style="display:inline"><input name="csrf" type="hidden" value="{{$.CSRF}}"><input type="hidden" name="status" value="0"><button>禁用</button></form>
  {{else}}
  <form method="post" action="/admin/users/{{.ID}}/status" style="display:inline"><input name="csrf" type="hidden" value="{{$.CSRF}}"><input type="hidden" name="status" value="1"><button>启用</button></form>
  {{end}}
</td></tr>{{end}}
</table>{{end}}
