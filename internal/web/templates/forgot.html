{{define "content"}}
<h2>忘记密码</h2>
{{if .Data.error}}<p class="err">{{.Data.error}}</p>{{end}}
{{if .Data.msg}}<p>{{.Data.msg}}</p>{{end}}
<form method="post" action="/forgot">
  <input name="email" placeholder="注册邮箱" required><br>
  <button>发送重置邮件</button>
</form>
<p><a href="/login">返回登录</a></p>{{end}}
