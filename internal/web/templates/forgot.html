{{define "content"}}
<div class="max-w-sm mx-auto min-h-[70vh] flex flex-col justify-center">
  <div class="text-center mb-6">
    <div class="w-14 h-14 rounded-2xl mx-auto mb-3 inline-flex items-center justify-center" style="background-image:linear-gradient(135deg,var(--brand-grad-from),var(--brand-grad-to));box-shadow:var(--shadow-md)">
      <svg class="icon" style="width:28px;height:28px;color:#fff"><use href="#icon-mail"></use></svg>
    </div>
    <h2 class="text-2xl font-bold" style="color:var(--text-strong)">忘记密码</h2>
    <p class="text-sm mt-1" style="color:var(--text-muted)">输入注册邮箱，发送重置链接</p>
  </div>

  <div class="card-warm p-6">
    {{if .Data.error}}<div class="alert alert-error mb-4 px-4 py-3 flex items-center gap-2 text-sm"><svg class="icon shrink-0"><use href="#icon-alert"></use></svg><span>{{.Data.error}}</span></div>{{end}}
    {{if .Data.msg}}<div class="alert alert-success mb-4 px-4 py-3 flex items-center gap-2 text-sm"><svg class="icon shrink-0"><use href="#icon-check"></use></svg><span>{{.Data.msg}}</span></div>{{end}}
    <form method="post" action="/forgot" class="grid gap-4">
      <input name="csrf" type="hidden" value="{{.CSRF}}">
      <label class="form-control block">
        <span class="text-xs font-medium mb-1.5 block uppercase tracking-wide" style="color:var(--text-muted)">注册邮箱</span>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--text-faint)"><svg class="icon" style="width:16px;height:16px"><use href="#icon-mail"></use></svg></span>
          <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required class="input-warm w-full pl-9 py-2.5 text-sm">
        </div>
      </label>
      <button type="submit" class="btn-brand py-2.5 text-sm font-semibold mt-2">发送重置邮件</button>
    </form>
  </div>

  <p class="mt-4 text-sm text-center" style="color:var(--text-muted)"><a class="hover:underline inline-flex items-center gap-1" style="color:var(--brand-solid)" href="/login"><svg class="icon" style="width:14px;height:14px"><use href="#icon-arrow-left"></use></svg>返回登录</a></p>
</div>
{{end}}
