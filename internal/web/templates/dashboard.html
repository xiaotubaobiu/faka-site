{{define "content"}}
<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">
  <div class="card bg-base-100 border border-base-300 rounded-2xl shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center gap-2 text-base-content/50 text-xs font-medium uppercase tracking-wide"><span>💰</span><span>当前余额</span></div>
      <div class="text-2xl font-bold text-primary mt-1">{{usd .Data.Balance}}</div>
    </div>
  </div>
  <div class="card bg-base-100 border border-base-300 rounded-2xl shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center gap-2 text-base-content/50 text-xs font-medium uppercase tracking-wide"><span>📦</span><span>总订单</span></div>
      <div class="text-2xl font-bold mt-1">{{.Data.OrderCount}}</div>
    </div>
  </div>
  <div class="card bg-base-100 border border-base-300 rounded-2xl shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center gap-2 text-base-content/50 text-xs font-medium uppercase tracking-wide"><span>📅</span><span>近30天消费</span></div>
      <div class="text-2xl font-bold mt-1">{{usd .Data.MonthlyUsed}}</div>
    </div>
  </div>
  {{if .Data.UserCount}}
  <div class="card bg-base-100 border border-base-300 rounded-2xl shadow-sm">
    <div class="card-body p-4">
      <div class="flex items-center gap-2 text-base-content/50 text-xs font-medium uppercase tracking-wide"><span>👥</span><span>启用用户</span></div>
      <div class="text-2xl font-bold mt-1">{{.Data.UserCount}}</div>
    </div>
  </div>
  {{end}}
</div>
{{if .Data.UserCount}}
<div class="card bg-base-100 border border-base-300 rounded-2xl shadow-sm mb-5">
  <div class="card-body p-4 flex-row items-center justify-between">
    <div class="flex items-center gap-2 text-sm text-base-content/60"><span>🏦</span><span>平台总余额</span></div>
    <div class="text-lg font-bold">{{usd .Data.PlatformBalance}}</div>
  </div>
</div>
{{end}}
<a href="/buy" class="btn btn-primary btn-block sm:btn-wide mb-5">＋ 购买兑换码</a>
<h3 class="text-lg font-semibold mb-2">最近订单</h3>
{{template "orders_list" .}}
{{end}}
