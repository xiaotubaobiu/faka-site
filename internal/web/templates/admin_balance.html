{{define "content"}}
<h2 class="text-xl font-bold mb-4 flex items-center gap-2" style="color:var(--text-strong)"><svg class="icon" style="width:20px;height:20px;color:var(--brand-solid)"><use href="#icon-wallet"></use></svg>给 {{.Data.target.Email}} 加余额</h2>
<form method="post" action="/admin/balance" class="card-warm p-6 grid gap-4 max-w-xl">
  <input name="csrf" type="hidden" value="{{.CSRF}}">
  <input name="id" type="hidden" value="{{.Data.target.ID}}">
  <label class="block">
    <span class="text-xs font-medium uppercase tracking-wide block mb-1.5" style="color:var(--text-muted)">金额（美元 $）</span>
    <div class="input-warm flex items-center px-3 py-2.5">
      <span class="mr-1" style="color:var(--text-faint)">$</span>
      <input name="amount" type="number" min="0.01" step="0.01" placeholder="10.00" required class="grow bg-transparent outline-none text-sm" style="color:var(--text-strong)">
    </div>
  </label>
  <button class="btn-brand py-2.5 text-sm font-semibold mt-2">加余额</button>
</form>
{{end}}
