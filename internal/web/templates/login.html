{{define "content"}}
<div class="max-w-sm mx-auto min-h-[70vh] flex flex-col justify-center">
  <div class="text-center mb-6">
    <div class="w-14 h-14 rounded-2xl mx-auto mb-3 inline-flex items-center justify-center" style="background-image:linear-gradient(135deg,var(--brand-grad-from),var(--brand-grad-to));box-shadow:var(--shadow-md)">
      <svg class="icon" style="width:28px;height:28px;color:#fff"><use href="#icon-ticket"></use></svg>
    </div>
    <h2 class="text-2xl font-bold" style="color:var(--text-strong)">登录</h2>
    <p class="text-sm mt-1" style="color:var(--text-muted)">登录发卡站管理账户</p>
  </div>

  <div class="card-warm p-6">
    {{if .Data.error}}<div class="alert alert-error mb-4 px-4 py-3 flex items-center gap-2 text-sm"><svg class="icon shrink-0"><use href="#icon-alert"></use></svg><span>{{.Data.error}}</span></div>{{end}}
    <form method="post" action="/login" class="grid gap-4">
      <input name="csrf" type="hidden" value="{{.CSRF}}">
      <label class="form-control block">
        <span class="text-xs font-medium mb-1.5 block uppercase tracking-wide" style="color:var(--text-muted)">邮箱</span>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--text-faint)"><svg class="icon" style="width:16px;height:16px"><use href="#icon-mail"></use></svg></span>
          <input name="email" type="email" autocomplete="email" inputmode="email" placeholder="you@example.com" required autofocus class="input-warm w-full pl-9 py-2.5 text-sm">
        </div>
      </label>
      <label class="form-control block">
        <span class="text-xs font-medium mb-1.5 block uppercase tracking-wide" style="color:var(--text-muted)">密码</span>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color:var(--text-faint)"><svg class="icon" style="width:16px;height:16px"><use href="#icon-lock"></use></svg></span>
          <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required class="input-warm w-full pl-9 py-2.5 text-sm">
        </div>
      </label>
      <button type="submit" class="btn-brand py-2.5 text-sm font-semibold mt-2">登录</button>
    </form>
  </div>

  <p class="mt-4 text-sm text-center" style="color:var(--text-muted)"><a class="hover:underline" style="color:var(--brand-solid)" href="/forgot">忘记密码?</a></p>
</div>
{{end}}
