{{define "content"}}
<div class="max-w-sm mx-auto">
<h2 class="text-xl font-semibold mb-3">登录</h2>
{{if .Data.error}}<div class="alert alert-error mb-3"><span>{{.Data.error}}</span></div>{{end}}
<form method="post" action="/login" class="grid gap-3">
  <label class="form-control">
    <span class="label-text mb-1">邮箱</span>
    <input name="email" type="email" autocomplete="email" inputmode="email" placeholder="邮箱" required autofocus class="input input-bordered">
  </label>
  <label class="form-control">
    <span class="label-text mb-1">密码</span>
    <input name="password" type="password" autocomplete="current-password" placeholder="密码" required class="input input-bordered">
  </label>
  <button class="btn btn-primary">登录</button>
</form>
<p class="mt-3 text-sm"><a class="link" href="/forgot">忘记密码?</a></p>
</div>
{{end}}
